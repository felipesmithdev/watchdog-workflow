name: Build Watchdog

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build:

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE
      run: |
        pyinstaller --clean --onefile watchdog.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Watchdog-Windows
        path: dist/watchdog.exe